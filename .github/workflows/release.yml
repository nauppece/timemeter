name: Release

# Build the plugin in CI and publish a GitHub release whose assets carry
# build provenance attestations (so users can verify main.js/styles.css were
# built from this source). Triggered by pushing a version tag, e.g. `0.1.5`.

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write # create the release
  id-token: write # required for attestations (OIDC)
  attestations: write # generate build provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Attest build provenance for release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" main.js manifest.json styles.css --clobber
          else
            gh release create "$tag" main.js manifest.json styles.css \
              --title "$tag" --notes "Release $tag"
          fi
